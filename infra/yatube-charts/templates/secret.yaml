apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  DEBUG: {{ .Values.backend.debug | default "False" | toString | b64enc | quote }}
  SECRET_KEY: {{ .Values.backend.env.SECRET_KEY | b64enc }}
  DB_HOST: {{ .Values.postgres.host | default "postgres" | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | b64enc }}
  POSTGRES_USER: {{ .Values.postgres.user | b64enc }}
  POSTGRES_DB: {{ .Values.postgres.database | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: django-superuser-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  DJANGO_SUPERUSER_USERNAME: {{ .Values.superuser.username | b64enc }}
  DJANGO_SUPERUSER_EMAIL: {{ .Values.superuser.email | b64enc }}
  DJANGO_SUPERUSER_PASSWORD: {{ .Values.superuser.password | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: yatube-tls-secrets
  namespace: {{ .Release.Namespace }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Files.Get .Values.tls.crtFile | b64enc }}
  tls.key: {{ .Files.Get .Values.tls.keyFile | b64enc }}     