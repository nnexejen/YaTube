# .github/workflows/ci.yml
name: YaTube CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: 'yatube/requirements.txt'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: |
          flake8 yatube/ --config .flake8

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_yatube
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r yatube/requirements.txt
          pip install pytest-cov==2.12.1

      - name: Scan Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r yatube/requirements.txt --desc || echo "Found vulnerabilities, but continuing"    

      - name: Run pytest
        run: pytest -v --cov=yatube --cov-report=xml
        env:
          DJANGO_SETTINGS_MODULE: yatube.settings
          DB_HOST: localhost          
          DB_NAME: ${{ secrets.DB_NAME }} 
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: 'false'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          retention-days: 1    

  docker-build:
    name: Build & Scan Docker
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/master'
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/yatube
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      # Собрать образ без пуша
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./yatube
          file: ./yatube/Dockerfile
          push: false  # Только сборка
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/yatube:${{ github.sha }}
          load: true   # Загрузить в Docker daemon для сканирования
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/yatube:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/yatube:buildcache,mode=max

      # Сканировать локальный образ
      - name: Run Trivy scanner (pre-push)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/yatube:${{ github.sha }}
          format: 'table'
          exit-code: '0'  # Демо-вариант. Для прода измените на 1
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # Запушить только если Trivy прошёл
      - name: Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: ./yatube
          file: ./yatube/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/yatube:buildcache

      - name: Notify on Build Failure
        if: failure()
        run: |
          curl -X POST "https://telegram.org{{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "text=<b>Сборка провалена!</b>%0A%0AПроект: ${{ github.repository }}%0AЭтап: Build & Scan%0A%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Смотреть логи ошибки</a>".repository }}/actions/runs/${{ github.run_id }}"    

  coverage:
    name: Upload Coverage to Codecov
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: .
          
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false       
          verbose: true

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/master'
    environment: staging  
  
    steps:
      - name: Deploy (dry-run)
        run: echo "Would deploy ${{ github.sha }} to staging"
        # Здесь позже будет: helm upgrade --dry-run ...

      # Уведомление о провале деплоя
      - name: Notify on failure
        if: failure() && github.ref == 'refs/heads/master'
        run: |
          curl -X POST "https://telegram.org{{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "text=<b>CI/CD Pipeline Failed!</b>%0A%0A<b>Repository:</b> ${{ github.repository }}%0A<b>Action:</b> <a href='${{ github.server_url }}/${{ github.repository }}'>View Logs</a>"

      # Уведомление об успехе (финальное)
      - name: Notify Success
        if: success()
        run: |
          curl -X POST "https://telegram.org{{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "text=<b>Деплой завершен успешно!</b>%0A%0AПроект: ${{ github.repository }}%0AВерсия: ${{ github.sha }}%0AСтатус: Staging обновлен"
      